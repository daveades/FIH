<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIH{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #07090d;
            --surface:   #0c1018;
            --surface-2: #121820;
            --surface-3: #1a2332;
            --border:    #1e2c3e;
            --border-2:  #243344;
            --accent:    #d4a843;
            --accent-dim:#8a6b26;
            --green:     #1db86a;
            --green-dim: #0d5c35;
            --red:       #e05252;
            --text:      #c8d4e0;
            --text-2:    #7a8fa8;
            --text-3:    #3d5068;
            --mono:      'JetBrains Mono', monospace;
            --sans:      'DM Sans', sans-serif;
            --serif:     'Instrument Serif', serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: #e8c060; }

        /* ── Nav ── */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            height: 52px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: var(--serif);
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand::before {
            content: '';
            display: block;
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-2);
            padding: 5px 12px;
            border-radius: 4px;
            letter-spacing: 0.03em;
            transition: color 0.15s, background 0.15s;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--surface-2);
        }

        /* ── Shared form styles ── */
        .field { margin-bottom: 14px; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-2);
            margin-bottom: 5px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--accent-dim);
        }

        input::placeholder { color: var(--text-3); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 20px;
            background: var(--accent);
            color: #000;
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn:hover { background: #e8c060; }
        .btn:disabled { background: var(--surface-3); color: var(--text-3); cursor: not-allowed; }
        .btn-full { width: 100%; }

        .error-msg {
            font-size: 0.78rem;
            color: var(--red);
            margin-bottom: 14px;
            padding: 8px 10px;
            background: rgba(224,82,82,0.07);
            border-left: 2px solid var(--red);
        }

        .success-msg {
            font-size: 0.78rem;
            color: var(--green);
            margin-bottom: 14px;
            padding: 8px 10px;
            background: rgba(29,184,106,0.07);
            border-left: 2px solid var(--green);
        }

        /* ── Ticker tape decoration ── */
        .page-noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px;
            z-index: 0;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="page-noise"></div>
    {% block body %}{% endblock %}
</body>
</html>
