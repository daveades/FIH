<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Intelligence Hub</title>
  <style>
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
    h1 { color: #00ff88; margin-bottom: 0.25rem; }
    p.sub { color: #666; margin-top: 0; }
    button { background: #00ff88; color: #000; border: none; padding: 0.6rem 1.4rem; font-size: 1rem; cursor: pointer; margin: 1rem 0; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    #log { background: #1a1a1a; border: 1px solid #333; padding: 1rem; height: 300px; overflow-y: auto; white-space: pre-wrap; font-size: 0.85rem; }
    #tickers { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.5rem; }
    .ticker-card { background: #1a1a1a; border: 1px solid #333; padding: 1rem; min-width: 160px; }
    .ticker-card h3 { margin: 0 0 0.25rem; color: #00ff88; }
    .ticker-card p { margin: 0; color: #aaa; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Finance Intelligence Hub</h1>
  <p class="sub">AI-powered stock research, straight to Notion.</p>

  <button id="run-btn" onclick="startRun()">Run Analysis</button>
  <div id="log">waiting for logs...</div>

  <div id="tickers"></div>

  <script>
    async function startRun() {
      const btn = document.getElementById("run-btn");
      const log = document.getElementById("log");
      btn.disabled = true;
      log.textContent = "";

      await fetch("/api/run", { method: "POST" });

      const source = new EventSource("/api/logs");
      source.onmessage = (e) => {
        log.textContent += e.data + "\n";
        log.scrollTop = log.scrollHeight;
      };
    }

    async function loadTickers() {
      const res = await fetch("/api/status");
      const data = await res.json();
      const container = document.getElementById("tickers");
      container.innerHTML = "";
      for (const t of data.tickers) {
        container.innerHTML += `
          <div class="ticker-card">
            <h3>${t.ticker}</h3>
            <p>${t.company}</p>
          </div>`;
      }
    }

    loadTickers();
  </script>
</body>
</html>
